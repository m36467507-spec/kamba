<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 نظام الرحلات الاحترافي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
}
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
header{
background:#111;
padding:15px;
text-align:center;
font-size:20px;
}
.container{
padding:15px;
max-width:1100px;
margin:auto;
}
#map{
height:350px;
border-radius:12px;
margin:15px 0;
}
button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}
button.danger{
background:#c62828;
}
input{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
width:120px;
}
.box{
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-top:15px;
}
label{display:block;margin-top:8px;}
audio{
width:100%;
margin-top:10px;
border-radius:10px;
}
@media(max-width:768px){
input{width:100%}
}
</style>
</head>
<body>

<header>
🚗 نظام إدارة الرحلات الاحترافي  
<br>
💰 إجمالي الأرباح: <span id="totalProfit">0</span> جنيه
</header>

<div class="container">

<button onclick="getMyLocation()">📍 موقعي</button>
<button onclick="startTrip()">🚗 بدء الرحلة</button>
<button onclick="endTrip()">🛑 إنهاء الرحلة</button>
<button onclick="exportCSV()">📄 تصدير Excel</button>

<br>

<button onclick="playRadio()">📻 تشغيل إذاعة القرآن الكريم</button>
<button onclick="stopRadio()" class="danger">⏹ إيقاف الإذاعة</button>

<div id="map"></div>

<audio id="quranRadio" controls style="display:none;"></audio>

<h3>⚙ إعدادات الحساب</h3>

<input type="number" id="pricePerKm" placeholder="سعر الكيلو" value="5">
<input type="number" id="pricePerMinute" placeholder="سعر الدقيقة" value="0.5">
<input type="number" id="fuelConsumption" placeholder="استهلاك/100كم" value="8">
<input type="number" id="fuelPrice" placeholder="سعر البنزين" value="12">

<h3>🚘 إعدادات إضافية</h3>

<label>
<input type="checkbox" id="acOn"> ❄ تشغيل التكييف
</label>
<input type="number" id="acFuelRate" placeholder="لتر/ساعة" value="1">

<label>
<input type="checkbox" id="kidsOn"> 🎮 ترفيه الأطفال
</label>
<input type="number" id="kidsCostPerHour" placeholder="جنيه/ساعة" value="5">

<div id="liveData" class="box"></div>
<div id="tripsList" class="box"></div>

</div>

<script>

/* ===== الخريطة ===== */

let map=L.map('map').setView([30.0444,31.2357],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker=null;
let polyline=L.polyline([],{color:"#00ff88"}).addTo(map);

/* ===== متغيرات الرحلة ===== */

let watchID=null;
let tripActive=false;
let totalDistance=0;
let startTime=0;
let lastPosition=null;
let trips=JSON.parse(localStorage.getItem("trips"))||[];

/* ===== أدوات مساعدة ===== */

function safeNum(val){
val=parseFloat(val);
return isNaN(val)?0:val;
}

function getMyLocation(){
navigator.geolocation.getCurrentPosition(p=>{
map.setView([p.coords.latitude,p.coords.longitude],16);
});
}

/* ===== بدء الرحلة ===== */

function startTrip(){

if(tripActive) return;

tripActive=true;
totalDistance=0;
startTime=Date.now();
lastPosition=null;
polyline.setLatLngs([]);

watchID=navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;
let newPos=L.latLng(lat,lng);

if(!userMarker){
userMarker=L.marker(newPos).addTo(map);
}else{
userMarker.setLatLng(newPos);
}

map.setView(newPos,16);

if(lastPosition){
let move=newPos.distanceTo(lastPosition);
if(move>5) totalDistance+=move/1000;
}

lastPosition=newPos;
polyline.addLatLng(newPos);

updateLive(pos.coords.speed?pos.coords.speed*3.6:0);

},{enableHighAccuracy:true});

}

/* ===== تحديث حي ===== */

function updateLive(speed=0){

if(!tripActive) return;

let minutes=(Date.now()-startTime)/60000;
let hours=minutes/60;

let pricePerKm=safeNum(document.getElementById("pricePerKm").value);
let pricePerMinute=safeNum(document.getElementById("pricePerMinute").value);
let fuelConsumption=safeNum(document.getElementById("fuelConsumption").value);
let fuelPrice=safeNum(document.getElementById("fuelPrice").value);

let acOn=document.getElementById("acOn").checked;
let acFuelRate=safeNum(document.getElementById("acFuelRate").value);

let kidsOn=document.getElementById("kidsOn").checked;
let kidsCostPerHour=safeNum(document.getElementById("kidsCostPerHour").value);

let rideCost=(totalDistance*pricePerKm)+(minutes*pricePerMinute);

let baseFuelUsed=(totalDistance/100)*fuelConsumption;
let acFuelUsed=acOn?acFuelRate*hours:0;
let fuelCost=(baseFuelUsed+acFuelUsed)*fuelPrice;

let kidsCost=kidsOn?kidsCostPerHour*hours:0;

let net=rideCost-fuelCost-kidsCost;

document.getElementById("liveData").innerHTML=
`
🚀 السرعة: ${speed.toFixed(1)} كم/س<br>
📏 المسافة: ${totalDistance.toFixed(2)} كم<br>
⏱ الزمن: ${minutes.toFixed(1)} دقيقة<br><hr>

💵 الأجرة: ${rideCost.toFixed(2)} جنيه<br>
⛽ وقود أساسي: ${(baseFuelUsed*fuelPrice).toFixed(2)} جنيه<br>
❄ تكلفة التكييف: ${(acFuelUsed*fuelPrice).toFixed(2)} جنيه<br>
🎮 ترفيه الأطفال: ${kidsCost.toFixed(2)} جنيه<br><hr>

💰 صافي الربح: ${net.toFixed(2)} جنيه
`;
}

setInterval(()=>updateLive(),1000);

/* ===== إنهاء الرحلة ===== */

function endTrip(){

if(!tripActive) return;

navigator.geolocation.clearWatch(watchID);

let minutes=(Date.now()-startTime)/60000;
let hours=minutes/60;

let pricePerKm=safeNum(document.getElementById("pricePerKm").value);
let pricePerMinute=safeNum(document.getElementById("pricePerMinute").value);
let fuelConsumption=safeNum(document.getElementById("fuelConsumption").value);
let fuelPrice=safeNum(document.getElementById("fuelPrice").value);

let acOn=document.getElementById("acOn").checked;
let acFuelRate=safeNum(document.getElementById("acFuelRate").value);
let kidsOn=document.getElementById("kidsOn").checked;
let kidsCostPerHour=safeNum(document.getElementById("kidsCostPerHour").value);

let rideCost=(totalDistance*pricePerKm)+(minutes*pricePerMinute);
let baseFuelUsed=(totalDistance/100)*fuelConsumption;
let acFuelUsed=acOn?acFuelRate*hours:0;
let fuelCost=(baseFuelUsed+acFuelUsed)*fuelPrice;
let kidsCost=kidsOn?kidsCostPerHour*hours:0;
let net=rideCost-fuelCost-kidsCost;

trips.push({
distance:totalDistance,
time:minutes,
income:rideCost,
fuel:fuelCost,
ac:acFuelUsed*fuelPrice,
kids:kidsCost,
net:net,
date:new Date().toLocaleString()
});

localStorage.setItem("trips",JSON.stringify(trips));

tripActive=false;
renderTrips();
alert("✅ تم إنهاء الرحلة");

}

/* ===== عرض الرحلات ===== */

function renderTrips(){

let html="";
let total=0;

trips.forEach(t=>{
total+=t.net;
html+=`
<hr>
📅 ${t.date}<br>
📏 ${t.distance.toFixed(2)} كم |
⏱ ${t.time.toFixed(1)} دقيقة<br>
💰 صافي: ${t.net.toFixed(2)} جنيه
`;
});

document.getElementById("tripsList").innerHTML=html;
document.getElementById("totalProfit").innerText=total.toFixed(2);

}

/* ===== تصدير ===== */

function exportCSV(){

let csv="Date,Distance,Time,Income,Fuel,AC,Kids,Net\n";

trips.forEach(t=>{
csv+=`${t.date},${t.distance},${t.time},${t.income},${t.fuel},${t.ac},${t.kids},${t.net}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="trips.csv";
a.click();

}

/* ===== 📻 إذاعة القرآن الكريم ===== */

function playRadio(){
let radio=document.getElementById("quranRadio");
radio.src="https://stream.radiojar.com/8s5u5tpdtwzuv";
radio.style.display="block";
radio.play();
}

function stopRadio(){
let radio=document.getElementById("quranRadio");
radio.pause();
radio.currentTime=0;
radio.style.display="none";
}

renderTrips();

</script>

</body>
</html>
