<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🚗 نظام إدارة الرحلات المتطور</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#1e1e1e;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

#map{
height:400px;
border-radius:10px;
margin-bottom:15px;
}

.box{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-top:15px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:4px;
}

.deleteBtn{
background:#d32f2f;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

audio{
width:100%;
margin-top:10px;
}
</style>
</head>
<body>

<header>
🚗 نظام إدارة الرحلات  
<br>
💰 إجمالي الأرباح: <span id="totalProfit">0</span> جنيه
</header>

<div class="container">

<h3>🗺 اختر البداية ثم النهاية</h3>
<div id="map"></div>

<select id="carType">
<option value="6">🚗 صغيرة (6 لتر/100كم)</option>
<option value="8" selected>🚙 متوسطة (8 لتر/100كم)</option>
<option value="12">🚐 كبيرة (12 لتر/100كم)</option>
<option value="15">🛻 نقل خفيف (15 لتر/100كم)</option>
</select>

<input type="number" id="fuelPrice" placeholder="سعر لتر البنزين" value="12">
<input type="number" id="customerMoney" placeholder="الزبون دفع كام؟">

<button onclick="saveTrip()">➕ أضف الرحلة</button>

<div id="tripDetails" class="box"></div>
<div id="tripsList" class="box"></div>

<div class="box">
<h3>🎧 إذاعة القرآن الكريم</h3>
<button onclick="playQuran()">▶ تشغيل</button>
<button onclick="stopQuran()">⏹ إيقاف</button>
<audio id="quranAudio"></audio>
</div>

</div>

<script>

// ================== الخريطة ==================
let map = L.map('map').setView([30.0444,31.2357],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let startPoint=null;
let endPoint=null;
let startMarker=null;
let endMarker=null;

map.on('click', function(e){
if(!startPoint){
startPoint=e.latlng;
startMarker=L.marker(startPoint).addTo(map).bindPopup("📍 البداية").openPopup();
}else if(!endPoint){
endPoint=e.latlng;
endMarker=L.marker(endPoint).addTo(map).bindPopup("📍 النهاية").openPopup();
}else{
map.removeLayer(startMarker);
map.removeLayer(endMarker);
startPoint=e.latlng;
endPoint=null;
startMarker=L.marker(startPoint).addTo(map).bindPopup("📍 البداية").openPopup();
}
});

// ================== حساب المسافة ==================
function calculateDistance(lat1, lon1, lat2, lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

// ================== الرحلات ==================
let trips = JSON.parse(localStorage.getItem("trips")) || [];

function updateTotal(){
let total = trips.reduce((sum,t)=>sum+t.net,0);
document.getElementById("totalProfit").innerText = total.toFixed(2);
}

function renderTrips(){
let html="";
trips.forEach((t,i)=>{
html+=`
<div>
🚘 رحلة ${i+1} - ${t.carType}  
<br>المسافة: ${t.distance.toFixed(1)} كم  
<br>صافي: ${t.net.toFixed(2)} جنيه  
<br>
<button class="deleteBtn" onclick="deleteTrip(${i})">🗑 حذف</button>
<hr>
</div>`;
});
document.getElementById("tripsList").innerHTML=html;
updateTotal();
}

function deleteTrip(index){
trips.splice(index,1);
localStorage.setItem("trips",JSON.stringify(trips));
renderTrips();
}

function saveTrip(){
if(!startPoint || !endPoint){
alert("حدد النقطتين الأول");
return;
}

let customerMoney=parseFloat(document.getElementById("customerMoney").value)||0;
let fuelPrice=parseFloat(document.getElementById("fuelPrice").value)||0;
let consumption=parseFloat(document.getElementById("carType").value);
let carName=document.getElementById("carType").options[document.getElementById("carType").selectedIndex].text;

let distance=calculateDistance(
startPoint.lat,startPoint.lng,
endPoint.lat,endPoint.lng
);

let fuelUsed=(distance/100)*consumption;
let fuelCost=fuelUsed*fuelPrice;
let net=customerMoney - fuelCost;

let trip={
distance,
fuelCost,
customerMoney,
net,
carType:carName
};

trips.push(trip);
localStorage.setItem("trips",JSON.stringify(trips));

document.getElementById("tripDetails").innerHTML=
`المسافة: ${distance.toFixed(2)} كم <br>
نوع العربية: ${carName} <br>
تكلفة البنزين: ${fuelCost.toFixed(2)} جنيه <br>
الزبون دفع: ${customerMoney} جنيه <br>
صافي الربح: ${net.toFixed(2)} جنيه`;

renderTrips();
}

// ================== القرآن ==================
function playQuran(){
let audio=document.getElementById("quranAudio");
audio.src="https://stream.radiojar.com/8s5u5tpdtwzuv";
audio.play();
}

function stopQuran(){
let audio=document.getElementById("quranAudio");
audio.pause();
}

renderTrips();

</script>

</body>
</html>
