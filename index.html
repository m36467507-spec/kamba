<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🚗 نظام إدارة الرحلات الاحترافي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background: linear-gradient(-45deg, #1a1a1a, #0f2027, #203a43, #2c5364);
background-size: 400% 400%;
animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

#map{
height:400px;
border-radius:12px;
margin-bottom:15px;
}

.box{
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:4px;
}

.deleteBtn{
background:#d32f2f;
}

input,select{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}
</style>
</head>
<body>

<header>
🚗 نظام إدارة الرحلات الاحترافي  
<br>
💰 إجمالي الأرباح: <span id="totalProfit">0</span> جنيه
</header>

<div class="container">

<h3>📍 اختر نهاية الرحلة</h3>
<div id="map"></div>

<select id="carType">
<option value="6">🚗 صغيرة</option>
<option value="8" selected>🚙 متوسطة</option>
<option value="12">🚐 كبيرة</option>
<option value="15">🛻 نقل خفيف</option>
</select>

<input type="number" id="fuelPrice" placeholder="سعر لتر البنزين" value="12">
<input type="number" id="customerMoney" placeholder="الزبون دفع كام؟">

<button onclick="saveTrip()">➕ حفظ الرحلة</button>

<div id="tripDetails" class="box"></div>
<div id="tripsList" class="box"></div>

</div>

<script>

let map = L.map('map').setView([30.0444,31.2357],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let startPoint=null;
let endPoint=null;
let routingControl=null;
let realDistance=0;
let realTime=0;

// تحديد موقعك تلقائيًا
if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude;
let lng = position.coords.longitude;

startPoint = L.latLng(lat,lng);

map.setView([lat,lng],15);

L.marker([lat,lng])
.addTo(map)
.bindPopup("📍 موقعك الحالي")
.openPopup();

});
}

// اختيار نهاية الرحلة
map.on('click', function(e){

if(!startPoint){
alert("انتظر تحديد موقعك");
return;
}

endPoint = e.latlng;

if(routingControl){
map.removeControl(routingControl);
}

routingControl = L.Routing.control({
waypoints: [
startPoint,
endPoint
],
routeWhileDragging:false,
show:false,
lineOptions:{
styles:[{color:'#00ff88', weight:6}]
}
}).addTo(map);

routingControl.on('routesfound', function(e){
let route = e.routes[0];
realDistance = route.summary.totalDistance / 1000;
realTime = route.summary.totalTime / 60;
});

});

// ================== الرحلات ==================
let trips = JSON.parse(localStorage.getItem("trips")) || [];

function updateTotal(){
let total = trips.reduce((sum,t)=>sum+t.net,0);
document.getElementById("totalProfit").innerText = total.toFixed(2);
}

function renderTrips(){
let html="";
trips.forEach((t,i)=>{
html+=`
<div>
🚘 رحلة ${i+1}  
<br>المسافة الحقيقية: ${t.distance.toFixed(2)} كم  
<br>الزمن المتوقع: ${t.time.toFixed(1)} دقيقة  
<br>صافي الربح: ${t.net.toFixed(2)} جنيه  
<br>
<button class="deleteBtn" onclick="deleteTrip(${i})">🗑 حذف</button>
<hr>
</div>`;
});
document.getElementById("tripsList").innerHTML=html;
updateTotal();
}

function deleteTrip(index){
trips.splice(index,1);
localStorage.setItem("trips",JSON.stringify(trips));
renderTrips();
}

function saveTrip(){

if(realDistance===0){
alert("اختر نهاية الرحلة أولًا");
return;
}

let customerMoney=parseFloat(document.getElementById("customerMoney").value)||0;
let fuelPrice=parseFloat(document.getElementById("fuelPrice").value)||0;
let consumption=parseFloat(document.getElementById("carType").value);

let fuelUsed=(realDistance/100)*consumption;
let fuelCost=fuelUsed*fuelPrice;
let net=customerMoney - fuelCost;

let trip={
distance:realDistance,
time:realTime,
net:net
};

trips.push(trip);
localStorage.setItem("trips",JSON.stringify(trips));

document.getElementById("tripDetails").innerHTML=
`📏 المسافة الحقيقية: ${realDistance.toFixed(2)} كم <br>
⏱ الزمن المتوقع: ${realTime.toFixed(1)} دقيقة <br>
⛽ تكلفة البنزين: ${fuelCost.toFixed(2)} جنيه <br>
💰 صافي الربح: ${net.toFixed(2)} جنيه`;

renderTrips();
}

renderTrips();

</script>

</body>
</html>
