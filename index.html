<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🚗 رحلات السيارة – ديناميكية حسب الوقت</title>

<!-- Leaflet خرائط -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* --------- خلفية ديناميكية حسب الوقت --------- */
body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow-x:hidden;
    min-height:100vh;
    position:relative;
    transition: background 2s ease;
    background-size: cover;
}

/* السيارة المتحركة */
#car {
    position: fixed;
    bottom: 20px;
    left: -150px;
    width: 150px;
    transition: left 10s linear;
}

/* ترويسة */
header{
    background: rgba(0,0,0,0.6);
    padding:20px;
    font-size:24px;
    text-align:center;
    text-shadow:0 0 10px rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
}

/* الحاوية */
.container{
    padding:20px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    border-radius:15px;
    margin:20px auto;
    max-width:800px;
}

/* مدخلات ونصوص */
input,button{
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    font-size:16px;
}
input{width:250px;}
button{background:#4CAF50;color:#fff;cursor:pointer;transition:0.3s;}
button:hover{background:#45a049;}

/* خريطة */
.map-container{
    width:100%;
    height:300px;
    margin:15px 0;
    border-radius:10px;
    overflow:hidden;
    border:2px solid #4CAF50;
}

/* الرحلات */
.trip{
    background: rgba(0,0,0,0.5);
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<header>🚗 رحلات السيارة – ديناميكية حسب الوقت</header>

<div class="container">

<h2>📍 بيانات الرحلة</h2>
<input type="text" id="startPoint" placeholder="نقطة الانطلاق (مثال: القاهرة)" /><br>
<input type="text" id="endPoint" placeholder="نقطة الوصول (مثال: الإسكندرية)" /><br>
<input type="number" id="tripPrice" placeholder="سعر الرحلة بالجنيه" /><br>
<input type="number" id="fuelCost" placeholder="مصاريف البنزين" /><br>
<input type="number" id="carExpenses" placeholder="مصاريف أخرى" /><br>
<button onclick="planTrip()">📍 خطط الرحلة الآن</button>

<div id="tripInfo"></div>

<!-- صورة سيارة متحركة -->
<img src="https://images.unsplash.com/photo-1602524817360-0b1f3120f927?auto=format&fit=crop&w=600&q=80" id="car" />

<script>
// ======================= بيانات رادارات وإشارات المرور =======================
const radars = [
    [30.013056,31.208853], 
    [31.200092,29.918739]  
];
const trafficLights = [
    [30.044420,31.235712], 
    [31.215640,29.955270]  
];

// ======================= الطقس =======================
async function fetchWeather(lat,lng) {
    try {
        let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
        let data = await res.json();
        return data.current_weather.temperature + "°C";
    } catch {
        return "غير متوفر";
    }
}

// ======================= رسم الخريطة والمسار =======================
async function planTrip() {
    let startText = document.getElementById("startPoint").value;
    let endText = document.getElementById("endPoint").value;
    let price = parseFloat(document.getElementById("tripPrice").value)||0;
    let fuel = parseFloat(document.getElementById("fuelCost").value)||0;
    let expenses = parseFloat(document.getElementById("carExpenses").value)||0;
    let net = price - (fuel + expenses);

    let startRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(startText)}`);
    let endRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endText)}`);
    let startData = await startRes.json();
    let endData = await endRes.json();
    if(!startData[0] || !endData[0]) { alert("لم يتم العثور على الموقع"); return; }

    let startLat = parseFloat(startData[0].lat);
    let startLng = parseFloat(startData[0].lon);
    let endLat = parseFloat(endData[0].lat);
    let endLng = parseFloat(endData[0].lon);

    document.getElementById("tripInfo").innerHTML = `
        <div class="trip">
        <strong>🚘 من: </strong>${startText} → <strong>إلى: </strong>${endText}<br>
        سعر الرحلة: ${price} جنيه<br>
        مصاريف الوقود: ${fuel} جنيه<br>
        مصاريف أخرى: ${expenses} جنيه<br>
        <strong>صافي الربح: ${net} جنيه</strong><br><br>
        <div class="map-container" id="tripMap"></div>
        <div>🌡️ درجة الحرارة في نقطة الانطلاق: <span id="wStart">...</span></div>
        <div>🌡️ درجة الحرارة في نقطة الوصول: <span id="wEnd">...</span></div>
        </div>
    `;

    let map = L.map('tripMap').setView([ (startLat+endLat)/2, (startLng+endLng)/2 ], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    L.marker([startLat,startLng]).addTo(map).bindPopup("📍 نقطة الانطلاق: "+startText).openPopup();
    L.marker([endLat,endLng]).addTo(map).bindPopup("📍 نقطة الوصول: "+endText);
    L.polyline([[startLat,startLng],[endLat,endLng]], {color:'#4CAF50', weight:4}).addTo(map);

    trafficLights.forEach(pos=> {
        L.marker(pos,{icon:L.icon({iconUrl:"https://img.icons8.com/color/48/000000/traffic-light.png",iconSize:[30,30]})})
        .addTo(map).bindPopup("🚦 إشارة مرور");
    });
    radars.forEach(pos=> {
        L.marker(pos,{icon:L.icon({iconUrl:"https://img.icons8.com/color/48/000000/speed-camera.png",iconSize:[30,30]})})
        .addTo(map).bindPopup("📸 رادار سرعة");
    });

    document.getElementById("wStart").innerText = await fetchWeather(startLat,startLng);
    document.getElementById("wEnd").innerText = await fetchWeather(endLat,endLng);

    // تحريك السيارة
    let car = document.getElementById("car");
    car.style.left = "100%"; 
}

// ======================= تغيير الخلفية حسب الوقت =======================
function updateBackground() {
    let hour = new Date().getHours();
    if(hour >= 6 && hour < 17) {
        // نهار
        document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde?auto=format&fit=crop&w=1350&q=80')";
    } else if(hour >= 17 && hour < 19) {
        // غروب
        document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1350&q=80')";
    } else {
        // ليل
        document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1519682577862-22b62b24e493?auto=format&fit=crop&w=1350&q=80')";
    }
}
updateBackground();
setInterval(updateBackground, 60000); // تحديث كل دقيقة

</script>
</body>
</html>
