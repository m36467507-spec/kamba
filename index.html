<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🚗 مدونة رحلات السيارة – المتقدمة</title>

<!-- Leaflet خرائط -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;color:#fff;overflow-x:hidden;background:#0b0f1a;}
header{background:rgba(0,0,0,0.8);padding:20px;font-size:24px;text-align:center;}
.container{padding:20px;}
input,button{padding:12px;margin:5px;border-radius:8px;border:none;font-size:16px;}
input{width:250px;}
button{background:#4CAF50;color:#fff;cursor:pointer;}
button:hover{background:#45a049;}
.map-container{width:100%;height:300px;margin:15px 0;border-radius:10px;overflow:hidden;border:2px solid #4CAF50;}
.trip{background:rgba(0,0,0,0.5);padding:15px;margin:10px 0;border-radius:8px;}
.result{margin-top:15px;font-size:18px;}
</style>
</head>
<body>

<header>🚗 تخطيط الرحلات المتقدم + الخرائط + الطقس</header>

<div class="container">

<h2>📍 بيانات الرحلة</h2>
<input type="text" id="startPoint" placeholder="نقطة الانطلاق (مثال: القاهرة)" /><br>
<input type="text" id="endPoint" placeholder="نقطة الوصول (مثال: الإسكندرية)" /><br>
<input type="number" id="tripPrice" placeholder="سعر الرحلة بالجنيه" /><br>
<input type="number" id="fuelCost" placeholder="مصاريف البنزين" /><br>
<input type="number" id="carExpenses" placeholder="مصاريف أخرى" /><br>
<button onclick="planTrip()">📍 خطط الرحلة الآن</button>

<div id="tripInfo"></div>

</div>

<script>
// ======================= بيانات رادارات وإشارات المرور (نماذج) =======================
const radars = [
    [30.013056,31.208853], // مثال القاهرة
    [31.200092,29.918739]  // مثال الإسكندرية
];
const trafficLights = [
    [30.044420,31.235712], // وسط القاهرة
    [31.215640,29.955270]  // وسط الإسكندرية
];

// ======================= وظيفة الطقس =======================
async function fetchWeather(lat,lng) {
    try {
        let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
        let data = await res.json();
        return data.current_weather.temperature + "°C";
    } catch {
        return "غير متوفر";
    }
}

// ======================= رسم الخريطة والمسار =======================
async function planTrip() {
    let startText = document.getElementById("startPoint").value;
    let endText = document.getElementById("endPoint").value;
    let price = parseFloat(document.getElementById("tripPrice").value)||0;
    let fuel = parseFloat(document.getElementById("fuelCost").value)||0;
    let expenses = parseFloat(document.getElementById("carExpenses").value)||0;
    let net = price - (fuel + expenses);

    // الحصول على إحداثيات النقطة (هنا نستخدم Nominatim فقط كـ مثال / يمكن تغييرها لمصدر آخر)
    let startRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(startText)}`);
    let endRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endText)}`);
    let startData = await startRes.json();
    let endData = await endRes.json();
    if(!startData[0] || !endData[0]) {
        alert("لم يتم العثور على الموقع، حاول اسم مكان آخر");
        return;
    }

    let startLat = parseFloat(startData[0].lat);
    let startLng = parseFloat(startData[0].lon);
    let endLat = parseFloat(endData[0].lat);
    let endLng = parseFloat(endData[0].lon);

    // صفحة معلومات
    document.getElementById("tripInfo").innerHTML = `
        <div class="trip">
        <strong>🚘 من: </strong>${startText} → <strong>إلى: </strong>${endText}<br>
        سعر الرحلة: ${price} جنيه<br>
        مصاريف الوقود: ${fuel} جنيه<br>
        مصاريف أخرى: ${expenses} جنيه<br>
        <strong>صافي الربح: ${net} جنيه</strong><br><br>
        <div class="map-container" id="tripMap"></div>
        <div>🌡️ درجة الحرارة في نقطة الانطلاق: <span id="wStart">...</span></div>
        <div>🌡️ درجة الحرارة في نقطة الوصول: <span id="wEnd">...</span></div>
        </div>
    `;

    // رسم الخريطة
    let map = L.map('tripMap').setView([ (startLat+endLat)/2, (startLng+endLng)/2 ], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

    // ماركر البداية والنهاية
    L.marker([startLat,startLng]).addTo(map).bindPopup("📍 نقطة الانطلاق: "+startText);
    L.marker([endLat,endLng]).addTo(map).bindPopup("📍 نقطة الوصول: "+endText);

    // خط المسار (خط مستقيم مؤقت)
    L.polyline([[startLat,startLng],[endLat,endLng]], {color:'#4CAF50'}).addTo(map);

    // إشارات المرور
    trafficLights.forEach(pos=> {
        L.marker(pos,{icon:L.icon({iconUrl:"https://img.icons8.com/color/48/000000/traffic-light.png",iconSize:[30,30]})})
        .addTo(map).bindPopup("🚦 إشارة مرور");
    });

    // الرادارات
    radars.forEach(pos=> {
        L.marker(pos,{icon:L.icon({iconUrl:"https://img.icons8.com/color/48/000000/speed-camera.png",iconSize:[30,30]})})
        .addTo(map).bindPopup("📸 رادار سرعة");
    });

    // عرض الطقس
    document.getElementById("wStart").innerText = await fetchWeather(startLat,startLng);
    document.getElementById("wEnd").innerText = await fetchWeather(endLat,endLng);
}

</script>

</body>
</html>
