<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🚗 رحلات ذكية + خريطة تفاعلية + قرآن</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#1e1e1e;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

#map{
height:400px;
border-radius:10px;
margin-bottom:15px;
}

.result{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:5px 0;
}

select{
padding:8px;
border-radius:6px;
margin:5px;
}
.quran-box{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-top:20px;
text-align:center;
}
</style>
</head>
<body>

<header>🚗 حدد رحلتك من الخريطة + استمع للقرآن</header>

<div class="container">

<h3>🗺 اضغط على الخريطة لاختيار البداية ثم النهاية</h3>
<div id="map"></div>

<button onclick="calculateTrip()">احسب الرحلة</button>

<div id="output" class="result"></div>

<!-- مشغل القرآن -->
<div class="quran-box">
<h3>🎧 القرآن الكريم</h3>

<select id="surah">
<option value="001.mp3">الفاتحة</option>
<option value="002.mp3">البقرة</option>
<option value="018.mp3">الكهف</option>
<option value="036.mp3">يس</option>
<option value="067.mp3">الملك</option>
</select>

<br>

<button onclick="playQuran()">▶ تشغيل</button>
<button onclick="stopQuran()">⏹ إيقاف</button>

<br><br>
<audio id="audio" controls style="width:100%"></audio>
</div>

</div>

<script>

// إنشاء الخريطة
let map = L.map('map').setView([30.0444,31.2357],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let startMarker=null;
let endMarker=null;
let startPoint=null;
let endPoint=null;

// اختيار النقاط بالضغط
map.on('click', function(e){
if(!startPoint){
startPoint=e.latlng;
startMarker=L.marker(startPoint).addTo(map).bindPopup("📍 نقطة البداية").openPopup();
}else if(!endPoint){
endPoint=e.latlng;
endMarker=L.marker(endPoint).addTo(map).bindPopup("📍 نقطة النهاية").openPopup();
}else{
map.removeLayer(startMarker);
map.removeLayer(endMarker);
startPoint=e.latlng;
endPoint=null;
startMarker=L.marker(startPoint).addTo(map).bindPopup("📍 نقطة البداية").openPopup();
}
});

// حساب المسافة
function calculateDistance(lat1, lon1, lat2, lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

function calculateTrip(){
if(!startPoint || !endPoint){
alert("حدد النقطتين الأول");
return;
}

let distance=calculateDistance(
startPoint.lat,startPoint.lng,
endPoint.lat,endPoint.lng
);

let fuelUsed=(distance/100)*8; // 8 لتر لكل 100 كم
let fuelCost=fuelUsed*12; // سعر اللتر 12 جنيه

let avgSpeed=80;
let time=distance/avgSpeed;
let h=Math.floor(time);
let m=Math.round((time-h)*60);

document.getElementById("output").innerHTML=
`المسافة: ${distance.toFixed(2)} كم <br>
استهلاك البنزين: ${fuelUsed.toFixed(2)} لتر <br>
تكلفة البنزين: ${fuelCost.toFixed(2)} جنيه <br>
الوقت المتوقع: ${h} ساعة و ${m} دقيقة`;
}

// ================== القرآن ==================

function playQuran(){
let surah=document.getElementById("surah").value;
let audio=document.getElementById("audio");
audio.src=`https://download.quranicaudio.com/qdc/abdul_basit/murattal/${surah}`;
audio.play();
}

function stopQuran(){
let audio=document.getElementById("audio");
audio.pause();
audio.currentTime=0;
}

</script>

</body>
</html>
