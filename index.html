<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🚗 نظام الرحلات الاحترافي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
}
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
}
.container{
padding:15px;
max-width:1000px;
margin:auto;
}
#map{
height:400px;
border-radius:12px;
margin:15px 0;
}
button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}
input{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}
.box{
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-top:15px;
}
</style>
</head>
<body>

<header>
🚗 نظام إدارة الرحلات الاحترافي  
<br>
💰 إجمالي الأرباح: <span id="totalProfit">0</span> جنيه
</header>

<div class="container">

<button onclick="getMyLocation()">📍 تحديد موقعي</button>
<button onclick="startTrip()">🚗 بدء الرحلة</button>
<button onclick="endTrip()">🛑 إنهاء الرحلة</button>
<button onclick="exportCSV()">📄 تصدير Excel</button>

<div id="map"></div>

<h3>⚙ إعدادات الحساب</h3>

<input type="number" id="pricePerKm" placeholder="سعر الكيلو" value="5">
<input type="number" id="pricePerMinute" placeholder="سعر الدقيقة" value="0.5">
<input type="number" id="fuelConsumption" placeholder="استهلاك لكل 100 كم" value="8">
<input type="number" id="fuelPrice" placeholder="سعر البنزين" value="12">

<div id="liveData" class="box"></div>
<div id="tripsList" class="box"></div>

</div>

<script>

let map=L.map('map').setView([30.0444,31.2357],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker=null;
let watchID=null;
let tripActive=false;

let totalDistance=0;
let startTime=0;
let lastPosition=null;
let polyline=null;
let path=[];

let trips=JSON.parse(localStorage.getItem("trips"))||[];

function getMyLocation(){
navigator.geolocation.getCurrentPosition(p=>{
let lat=p.coords.latitude;
let lng=p.coords.longitude;
map.setView([lat,lng],15);
});
}

function startTrip(){

if(tripActive) return;

tripActive=true;
totalDistance=0;
startTime=Date.now();
path=[];

watchID=navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;
let newPos=L.latLng(lat,lng);

if(!userMarker){
userMarker=L.marker(newPos).addTo(map);
}else{
userMarker.setLatLng(newPos);
}

map.setView(newPos,16);

if(lastPosition){
totalDistance+=newPos.distanceTo(lastPosition)/1000;
}

lastPosition=newPos;
path.push([lat,lng]);

if(polyline) map.removeLayer(polyline);
polyline=L.polyline(path,{color:"#00ff88"}).addTo(map);

updateLive();

},{enableHighAccuracy:true});

}

function updateLive(){

let minutes=(Date.now()-startTime)/60000;

let pricePerKm=parseFloat(document.getElementById("pricePerKm").value);
let pricePerMinute=parseFloat(document.getElementById("pricePerMinute").value);
let fuelConsumption=parseFloat(document.getElementById("fuelConsumption").value);
let fuelPrice=parseFloat(document.getElementById("fuelPrice").value);

let rideCost=(totalDistance*pricePerKm)+(minutes*pricePerMinute);

let fuelUsed=(totalDistance/100)*fuelConsumption;
let fuelCost=fuelUsed*fuelPrice;

let net=rideCost-fuelCost;

document.getElementById("liveData").innerHTML=
`
📏 المسافة: ${totalDistance.toFixed(2)} كم<br>
⏱ الزمن: ${minutes.toFixed(1)} دقيقة<br>
💵 الأجرة: ${rideCost.toFixed(2)} جنيه<br>
⛽ تكلفة البنزين: ${fuelCost.toFixed(2)} جنيه<br>
💰 صافي الربح: ${net.toFixed(2)} جنيه
`;

}

function endTrip(){

if(!tripActive) return;

navigator.geolocation.clearWatch(watchID);

let minutes=(Date.now()-startTime)/60000;

let pricePerKm=parseFloat(document.getElementById("pricePerKm").value);
let pricePerMinute=parseFloat(document.getElementById("pricePerMinute").value);
let fuelConsumption=parseFloat(document.getElementById("fuelConsumption").value);
let fuelPrice=parseFloat(document.getElementById("fuelPrice").value);

let rideCost=(totalDistance*pricePerKm)+(minutes*pricePerMinute);
let fuelUsed=(totalDistance/100)*fuelConsumption;
let fuelCost=fuelUsed*fuelPrice;
let net=rideCost-fuelCost;

trips.push({
distance:totalDistance,
time:minutes,
income:rideCost,
fuel:fuelCost,
net:net,
date:new Date().toLocaleString()
});

localStorage.setItem("trips",JSON.stringify(trips));

tripActive=false;
lastPosition=null;

renderTrips();
alert("✅ تم إنهاء الرحلة");

}

function renderTrips(){

let html="";
let total=0;

trips.forEach((t,i)=>{
total+=t.net;
html+=`
<hr>
📅 ${t.date}<br>
📏 ${t.distance.toFixed(2)} كم |
⏱ ${t.time.toFixed(1)} دقيقة<br>
💰 صافي: ${t.net.toFixed(2)} جنيه
`;
});

document.getElementById("tripsList").innerHTML=html;
document.getElementById("totalProfit").innerText=total.toFixed(2);

}

function exportCSV(){

let csv="Date,Distance,Time,Income,FuelCost,Net\n";

trips.forEach(t=>{
csv+=`${t.date},${t.distance},${t.time},${t.income},${t.fuel},${t.net}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="trips.csv";
a.click();

}

renderTrips();

</script>
</body>
</html>
